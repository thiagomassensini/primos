name: Ensure v0.45.0 Release

on:
  push:
    branches:
      - ops/ensure-v0.45.0-release
    paths:
      - .github/workflows/ensure-v0.45.0-release.yml

permissions:
  contents: write

jobs:
  ensure-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure published release and persist proof
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v0.45.0
          TITLE: CPFormal v0.45.0 — Genuine-first real spectral and enriched TFVD checkpoint
          OPS_BRANCH: ops/ensure-v0.45.0-release
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --verify-tag \
              --title "${TITLE}" \
              --notes-file docs/RELEASE_0.45.0.md
          fi

          mkdir -p ops
          gh release view "${TAG}" \
            --json tagName,name,isDraft,isPrerelease,url,publishedAt,targetCommitish \
            > ops/release-v0.45.0-confirmed.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ops/release-v0.45.0-confirmed.json
          git commit -m "chore(release): persist v0.45.0 publication proof"
          git push origin "HEAD:${OPS_BRANCH}"
