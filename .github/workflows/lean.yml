name: Lean kernel audit

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lean-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build CPFormal
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Static audit
        run: bash scripts/static_audit.sh

      - name: Elaborate with Lean kernel
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: true
          build-args: --wfail
          test: false
          lint: false
          use-mathlib-cache: true
