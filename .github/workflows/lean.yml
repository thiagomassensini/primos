name: Lean kernel audit

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lean-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build CPFormal
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Static audit
        run: bash scripts/static_audit.sh

      - name: Set up Lean and mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true

      - name: Elaborate with Lean kernel
        shell: bash
        run: |
          set -o pipefail
          lake build --wfail 2>&1 | tee lean-build.log

      - name: Preserve Lean failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lean-build-log-${{ github.run_id }}
          path: lean-build.log
          if-no-files-found: ignore
          retention-days: 7
